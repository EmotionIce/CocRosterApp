<!doctype html>
<!-- Lightweight redirect shell that preserves query/hash when entering the public app. -->
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to CWL Roster</title>
  <meta http-equiv="refresh" content="0; url=/" />
  <link rel="canonical" href="/" />
</head>
<body style="margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:16px;background:#0b0f17;color:#e5e7eb;">
  <p style="margin:0 0 6px;">Redirecting to the public roster page.</p>
  <p style="margin:0;"><a style="color:#93c5fd;" href="/">Continue</a></p>
  <script>
    // Preserve the incoming query string and hash when redirecting to the root shell.
    (function () {
      if (typeof window === "undefined" || !window.location) return;
      var search = typeof window.location.search === "string" ? window.location.search : "";
      var hash = typeof window.location.hash === "string" ? window.location.hash : "";
      var target = "/" + search + hash;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
